; CouchDB config for Obsidian Self-hosted LiveSync.
; Mounted into /opt/couchdb/etc/local.d/local.ini by docker-compose.
; If a future plugin version expects different values, check the LiveSync docs.

[couchdb]
single_node = true
max_document_size = 50000000

[chttpd]
require_valid_user = true
enable_cors = true
max_http_request_size = 4294967296

[chttpd_auth]
require_valid_user = true

[cors]
credentials = true
origins = app://obsidian.md,capacitor://localhost,http://localhost
headers = accept, authorization, content-type, origin, referer
methods = GET, PUT, POST, HEAD, DELETE
max_age = 3600
